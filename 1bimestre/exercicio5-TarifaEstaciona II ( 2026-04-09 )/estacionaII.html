<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarifa de Estacionamento</title>
     <link rel="stylesheet" href="estacionaII.css">
</head>
<body>

    <main>
    
        <section>
            <h1>Calculadora de Tarifa</h1>

            <label for="datahotaI">Hora estacionada</label>
            <input type="datetime-local" id="datahoraI" 
            min="2026-01-01T00:00" max="2026-12-31T23:59"><br>
            
            <label for="datahotaF">Hora de saída</label>
            <input type="datetime-local" id="datahoraF" 
            min="2026-01-01T00:00" max="2026-12-31T23:59"><br><br>


            <label>
                <input type="checkbox" id="veiculo">
                Veículo de grande porte( adiciona 25% )
            </label><br><br>

            <label>
                <input type="checkbox" id="cliente"> 
                Cliente Frequente( desconta 5%)
            </label><br><br>
        
            <button id="btn-calc" onclick="fcalc()">calcular</button>

            
            <div class="resultado">
                <strong class="tempCobrado">Tempo total cobrado: 
                    <span id="respH">...</span>
                </strong><br>
                <strong>Valor total a pagar: R$ </strong>
                <span id="resp">...</span>
            </div>
        </section>
    </main>
    <footer id ="footer">

         <span id="mensagem">Preencha os valores e calcule</span>

    </footer>
     <script src="estacionaII.js"></script>
</body>
</html>
