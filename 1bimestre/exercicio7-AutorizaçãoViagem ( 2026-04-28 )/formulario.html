<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Registrar Autorização</title>
    <link rel="stylesheet" href="formulario.css">
</head>

<body>
    <main>
        <header>
            <h1>Registrar Autorização</h1>
        </header>

        <section>
            <form action="autorizacao.html" method="GET" onsubmit="return validarFormulario()">

                <div class="campo">
                    <label>Nome do Atleta:</label><br>
                    <input type="text" id="nomeA" name="nomeA" placeholder="Nome completo" required>
                    <small class="erro" id="erroNomeA"></small>
                </div>

                <div class="campo">
                    <label>CPF:</label><br>
                    <input type="text" id="cpfA" name="cpfA" placeholder="Somente números" required>
                </div>

                <div class="campo">
                    <label>Idade:</label><br>
                    <input type="text" id="idade" name="idade" maxlength="2" placeholder="De 7 a 18 anos" required>
                    <small class="erro" id="erroIdade"></small>
                </div>

                <div class="campo">
                    <label>Nome do Responsável:</label><br>
                    <input type="text" id="nomeR" name="nomeR" placeholder="Nome completo" required>
                    <small class="erro" id="erroNomeR"></small>
                </div>

                <div class="campo">
                    <label>Cidade de Partida:</label><br>
                    <input type="text" id="cidadeP" name="cidadeP" placeholder="nome da cidade" required>
                </div>

                <div class="campo">
                    <label>Cidade de Destino:</label><br>
                    <input type="text" id="cidadeD" name="cidadeD" placeholder="nome da cidade" required>
                </div>

                <div class="campo">
                    <label>Modalidade:</label><br>
                    <select id="modal" name="modal">
                        <option>Vôlei</option>
                        <option>Futebol</option>
                        <option>Natação</option>
                    </select>
                </div>

                <input type="hidden" id="categoria" name="categoria">

                <button type="submit">Gerar Documento Oficial</button>

            </form>
        </section>
    </main>

    <script src="formulario.js"></script>

</body>

</html>
