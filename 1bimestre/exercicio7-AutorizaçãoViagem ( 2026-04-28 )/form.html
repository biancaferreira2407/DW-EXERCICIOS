<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Registro de Autorização</title>

    <style>
        :root {
            --azul: #0b3d91;
            --azul-claro: #e6eef8;
            --cinza: #6b6b6b;
            --borda: #dcdcdc;
            --erro: #d93025;
            --sucesso: #188038;
        }

        /* BASE */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--azul-claro);
        }

        /* CONTAINER */
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* CABEÇALHO */
        header {
            border-bottom: 2px solid var(--azul);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 22px;
            color: var(--azul);
        }

        /* GRID */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* CAMPOS */
        .campo {
            display: flex;
            flex-direction: column;
        }

        .campo.full {
            grid-column: span 2;
        }

        label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }

        /* INPUTS */
        input,
        select {
            padding: 10px;
            border: 1px solid var(--borda);
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        /* FOCO */
        input:focus,
        select:focus {
            border-color: var(--azul);
            outline: none;
        }

        /* ERRO */
        .input-erro {
            border-color: var(--erro);
        }

        .erro {
            font-size: 12px;
            color: var(--erro);
            margin-top: 3px;
        }

        /* BOTÃO */
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: var(--azul);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #062c6b;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Autorização de Participação</h1>
        </header>

        <form class="form-grid" action="autorizacao.html" onsubmit="return validarFormulario()">

            <div class="campo full">
                <label>Nome do Atleta</label>
                <input type="text" id="nomeA" name="nomeA">
                <small class="erro" id="erroNomeA"></small>
            </div>

            <div class="campo">
                <label>CPF</label>
                <input type="text" id="cpfA" name="cpfA">
            </div>

            <div class="campo">
                <label>Idade</label>
                <input type="text" id="idade" name="idade">
                <small class="erro" id="erroIdade"></small>
            </div>

            <div class="campo">
                <label>Categoria</label>
                <input type="text" id="categoriaExibida" readonly>
            </div>

            <input type="hidden" id="categoria" name="categoria">

            <div class="campo full">
                <label>Nome do Responsável</label>
                <input type="text" id="nomeR" name="nomeR">
                <small class="erro" id="erroNomeR"></small>
            </div>

            <div class="campo">
                <label>Cidade de Partida</label>
                <input type="text" id="cidadeP" name="cidadeP">
            </div>

            <div class="campo">
                <label>Cidade de Destino</label>
                <input type="text" id="cidadeD" name="cidadeD">
            </div>

            <div class="campo full">
                <label>Modalidade</label>
                <select id="modal" name="modal">
                    <option>Vôlei</option>
                    <option>Futebol</option>
                    <option>Natação</option>
                </select>
            </div>

            <button type="submit">Gerar Documento Oficial</button>

        </form>
    </div>

    <script>
        function validarFormulario() {

            let valido = true;

            function validarNome(idInput, idErro) {
                let input = document.getElementById(idInput);
                let erro = document.getElementById(idErro);
                let partes = input.value.trim().split(/\s+/);

                if (partes.length < 2) {
                    erro.innerText = "Digite nome e sobrenome";
                    input.classList.add("input-erro");
                    valido = false;
                } else {
                    erro.innerText = "";
                    input.classList.remove("input-erro");
                }
            }

            validarNome("nomeA", "erroNomeA");
            validarNome("nomeR", "erroNomeR");

            let idade = parseInt(document.getElementById("idade").value);
            let erroIdade = document.getElementById("erroIdade");

            if (isNaN(idade) || idade < 7 || idade > 18) {
                erroIdade.innerText = "Idade deve ser entre 7 e 18";
                document.getElementById("idade").classList.add("input-erro");
                valido = false;
            } else {
                erroIdade.innerText = "";
                document.getElementById("idade").classList.remove("input-erro");

                let categoria;

                if (idade >= 14) {
                    categoria = "Adolescente";
                } else if (idade >= 12) {
                    categoria = "Pré-Adolescente";
                } else {
                    categoria = "Infantil";
                }

                document.getElementById("categoria").value = categoria;
            }

            return valido;
        }


        /* BLOQUEIOS */
        document.getElementById("idade").addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 2);
        });

        document.getElementById("cpfA").addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 11);
        });

        document.getElementById("idade").addEventListener("input", function () {
            let idade = parseInt(this.value);
            let categoria = "";

            if (isNaN(idade) || idade < 7 || idade > 18) {
                categoria = "Idade Inválida";
            } else {
                if (idade >= 14) {
                    categoria = "Adolescente";
                } else if (idade >= 12) {
                    categoria = "Pré-Adolescente";
                } else if (idade >= 7) {
                    categoria = "Infantil";
                }
            }

            document.getElementById("categoriaExibida").value = categoria;
            document.getElementById("categoria").value = categoria;
        });


        function capitalizarNome(valor) {
            return valor
                .toLowerCase()
                .replace(/\b\w/g, letra => letra.toUpperCase());
        }

        function formatarNome(id) {
            document.getElementById(id).addEventListener("input", function () {
                let valor = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');
                this.value = capitalizarNome(valor);
            });
        }

        // aplicar nos campos
        formatarNome("nomeA");
        formatarNome("nomeR");



        function capitalizarCidade(valor) {
            return valor
                .toLowerCase()
                .replace(/\b\w/g, letra => letra.toUpperCase());
        }

        function formatarCidade(id) {
            document.getElementById(id).addEventListener("input", function () {
                let valor = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');
                this.value = capitalizarCidade(valor);
            });
        }

        // aplicar nos campos
        formatarCidade("cidadeP");
        formatarCidade("cidadeD");

    </script>

</body>

</html>
