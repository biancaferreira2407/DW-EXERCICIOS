<!DOCTYPE html>
<html lang="pt-BR">
    
<head>
    <meta charset="UTF-8">
    <title>Registro de Autorização</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Autorização de Participação</h1>
        </header>

        <form class="form-grid" action="autorizacao.html" onsubmit="return validarFormulario()">

            <div class="campo full">
                <label>Nome do Atleta</label>
                <input type="text" id="nomeA" name="nomeA">
                <small class="erro" id="erroNomeA"></small>
            </div>

            <div class="campo">
                <label>CPF</label>
                <input type="text" id="cpfA" name="cpfA">
                <small class="erro" id="erroCpfA"></small>
            </div>

            <div class="campo">
                <label>Idade</label>
                <input type="text" id="idade" name="idade">
                <small class="erro" id="erroIdade"></small>
            </div>

            <div class="campo">
                <label>Categoria</label>
                <input type="text" id="categoriaExibida" readonly>
            </div>

            <input type="hidden" id="categoria" name="categoria">

            <div class="campo full">
                <label>Nome do Responsável</label>
                <input type="text" id="nomeR" name="nomeR">
                <small class="erro" id="erroNomeR"></small>
            </div>

            <div class="campo">
                <label>Cidade de Partida</label>
                <input type="text" id="cidadeP" name="cidadeP">
                <small class="erro" id="erroCidadeP"></small>
            </div>

            <div class="campo">
                <label>Cidade de Destino</label>
                <input type="text" id="cidadeD" name="cidadeD">
                <small class="erro" id="erroCidadeD"></small>
            </div>

            <div class="campo full">
                <label>Modalidade</label>
                <select id="modal" name="modal">
                    <option class="modal" >Vôlei</option>
                    <option class="modal" >Futebol</option>
                    <option class="modal" >Natação</option>
                </select>
            </div>

            <button type="submit">Gerar Documento Oficial</button>

        </form>
    </div>

    <script src="form.js"></script>

</body>

</html>
