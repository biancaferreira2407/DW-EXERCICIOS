<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Enviar Imagem e Mensagens</title>
    <link rel="stylesheet" href="cliente.css">
</head>

<body>

    <div class="container">
        <!-- <h1>Configurações de Conexão</h1> -->
        <!-- <label for="enderecoServidorInput">Endereço do Servidor:</label>
        <input type="text" id="enderecoServidorInput" placeholder="Digite o endereço do servidor" value="localhost">
        
        <label for="inputPorta">Porta:</label>
        <input type="text" id="inputPorta" placeholder="Digite a porta" value="3000">
        
        <hr> -->
        <form id="formPessoa" method="post" action="/enviar-dados" enctype="multipart/form-data">
            <h2>Formulário com dados</h2>

            <label for="inputCPF">CPF:</label>
            <input type="text" id="inputCPF" name="cpf" class="cpf" maxlength="11" placeholder="Digite seu CPF">

            <label for="inputNome">Nome:</label>
            <input type="text" id="inputNome" name="nome" placeholder="Digite seu nome">

            <label for="inputPeso">Peso:</label>
            <input type="text" id="inputPeso" name="peso" class="decimal" placeholder="Digite seu peso">

            <label for="inputAltura">Altura:</label>
            <input type="text" id="inputAltura" name="altura" class="decimal" placeholder="Digite sua altura">


            <label for="inputImagem">Selecione sua Foto:</label>
            <input type="file" id="inputImagem" name="foto" accept="image/*" onchange="mostrarPreview(event)">

            <div class="preview-container">
                <img id="previewImagem" alt="Preview da Foto do Aluno">
            </div>

            <button type="button" onclick="enviarDadosPessoa()">Enviar Dados do Aluno</button>
        </form>

        <h3>Resposta do servidor</h3>
        <div id="respostaImagem" class="resposta">Nenhum dado enviado ainda.</div>
    </div>

    <script>

        const inputCPF = document.getElementById("inputCPF");

        inputCPF.addEventListener("input", function () {

            // Remove tudo que não for número
            this.value = this.value.replace(/\D/g, "");

            // Limita em 11 dígitos
            if (this.value.length > 11) {
                this.value = this.value.slice(0, 11);
            }

        });

        document.querySelectorAll(".decimal").forEach(input => {

            input.addEventListener("input", function () {

                let valor = this.value;

                // Remove caracteres inválidos
                valor = valor.replace(/[^0-9.]/g, "");

                // Permite apenas um ponto
                const partes = valor.split(".");

                if (partes.length > 2) {
                    valor = partes[0] + "." + partes[1];
                }

                // Máximo de 3 números antes do ponto
                partes[0] = partes[0].slice(0, 3);

                // Máximo de 2 números depois do ponto
                if (partes[1] !== undefined) {
                    partes[1] = partes[1].slice(0, 2);
                    valor = partes[0] + "." + partes[1];
                } else {
                    valor = partes[0];
                }

                // Impede começar com ponto
                if (valor.startsWith(".")) {
                    valor = "";
                }

                this.value = valor;
            });
        });

        // Função que lê o arquivo local e exibe na tela antes/depois do upload
        function mostrarPreview(event) {
            const input = event.target;
            const preview = document.getElementById('previewImagem');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                // Quando o navegador terminar de processar a imagem localmente, define o src
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block'; // Torna a imagem visível
                }
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        }

        // --- FUNÇÃO PARA ENVIAR DADOS COMPLETOS DO ALUNO ---
        async function enviarDadosPessoa() {
            const enderecoServidor = 'localhost';
            const porta = '3000';
            const respostaDiv = document.getElementById("respostaImagem");

            // Coletando os dados do formulário
            const cpf = document.getElementById('inputCPF').value;
            const nome = document.getElementById('inputNome').value;
            const peso = parseFloat(document.getElementById('inputPeso').value);
            const altura = parseFloat(document.getElementById('inputAltura').value);
            const inputImagem = document.getElementById('inputImagem');

            // Validação dos campos

            if (cpf.length !== 11) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "CPF deve ter exatamente 11 dígitos!";
                document.getElementById('inputCPF').focus();
                return;
            }
            if (!cpf) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "Por favor, preencha o CPF !";
                document.getElementById('inputCPF').focus()
                return;
            }
            if (!nome) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "Por favor, preencha o nome !";
                document.getElementById('inputNome').focus()
                return;
            }
            if (nome.trim().split(/\s+/).length < 2) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "Digite nome e sobrenome!";
                document.getElementById('inputNome').focus();
                return;
            }
            if (!peso || peso<2.00 || peso>300.00) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "Por favor, preencha o peso com um valor numérico válido!";
                document.getElementById('inputPeso').focus()
                return;
            }
            if (!altura || altura<0.40 || altura>2.30) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "Por favor, preencha o altura com um valor numérico válido!";
                document.getElementById('inputAltura').focus()
                return;
            }

            if (isNaN(peso) || isNaN(altura)) {
                respostaDiv.className = "resposta aviso";
                respostaDiv.innerHTML = "Por favor, insira valores numéricos válidos para peso e altura!";
                return;
            }

            // Preparando os dados para enviar
            // o formData é uma estrutura que facilita o envio de dados, incluindo arquivos, em requisições HTTP POST
            // analogia, é uma mala onde podemos colocar vários itens (dados do aluno e a foto) e enviar tudo de uma vez para o servidor
            const formData = new FormData();
            formData.append('cpf', cpf);
            formData.append('nome', nome);
            formData.append('peso', peso);
            formData.append('altura', altura);

            if (inputImagem.files.length > 0) { // Verifica se um arquivo de imagem foi selecionado
                formData.append('foto', inputImagem.files[0]);
            }

            try {
                respostaDiv.className = "resposta";
                respostaDiv.innerHTML = "Enviando dados...";

                const response = await fetch(`http://${enderecoServidor}:${porta}/enviar-dados-pessoa`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Falha na resposta do servidor');
                }

                const data = await response.json();

                // Define a classe de sucesso (Verde) e atualiza o texto permanentemente
                respostaDiv.className = "resposta sucesso";
                respostaDiv.innerHTML = `
                <b>${data.mensagem}</b><br>
                Pessoa: ${nome} (CPF: ${cpf})<br>
                Peso: ${peso}<br>
                Altura: ${altura}<br>
                IMC: ${(peso / (altura ** 2)).toFixed(2)}<br>
                Situação: ${data.aluno.situacao}<br>
                ${data.nomeArquivo ? 'Foto salva como: ' + data.nomeArquivo : 'Nenhuma foto enviada'}
                `;

            } catch (error) {
                console.error('Erro:', error);
                // Define a classe de erro (Vermelho)
                respostaDiv.className = "resposta erro";
                respostaDiv.innerHTML = "Erro de comunicação: Não foi possível salvar os dados no servidor.";
            }
        }

        const inputNome = document.getElementById("inputNome");

        inputNome.addEventListener("input", function () {

            // Remove tudo que não for letra ou espaço
            let valor = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, "");

            // Deixa tudo minúsculo
            valor = valor.toLowerCase();

            // Primeira letra de cada palavra maiúscula
            valor = valor.replace(/\b\w/g, function (letra) {
                return letra.toUpperCase();
            });

            this.value = valor;
        });
    </script>
</body>

</html>
